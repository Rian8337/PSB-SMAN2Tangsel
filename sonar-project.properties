sonar.projectKey=PSB-SMAN2
sonar.projectName=PSB SMAN 2 Tangerang Selatan
sonar.sourceEncoding=UTF-8

sonar.sources=backend/src,frontend/src,packages/shared/src
sonar.tests=backend/tests,frontend/tests

# Generated/declaration files
sonar.exclusions=**/*.d.ts

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# packages/shared has no tests yet; keep it out of coverage metrics until it does
sonar.coverage.exclusions=packages/shared/src/**
